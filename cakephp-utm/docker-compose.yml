version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: utm_db
      MYSQL_USER: utm_user
      MYSQL_PASSWORD: utm_pass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - db_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "utm_user", "-putm_pass"]
      interval: 5s
      timeout: 10s
      retries: 10

  app:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_USER: utm_user
      DB_PASS: utm_pass
      DB_NAME: utm_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
